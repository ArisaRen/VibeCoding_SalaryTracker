<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>薪薪向荣 - 打工人时薪计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #FFF7F0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        @keyframes moneyFall {
            0% {
                transform: translateY(-15vh) rotate(0deg);
                opacity: 0.7;
            }
            100% {
                transform: translateY(115vh) rotate(360deg);
                opacity: 0;
            }
        }
        
        @keyframes coinFall {
            0% {
                transform: translateY(-15vh) rotate(0deg);
                opacity: 0.6;
            }
            100% {
                transform: translateY(115vh) rotate(-720deg);
                opacity: 0;
            }
        }
        
        .money-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        
        .floating-money {
            position: absolute;
            animation: moneyFall linear infinite;
            filter: drop-shadow(0 2px 3px rgba(0,0,0,0.1));
            will-change: transform;
        }
        
        .floating-coin {
            position: absolute;
            animation: coinFall linear infinite;
            filter: drop-shadow(0 2px 3px rgba(0,0,0,0.1));
            will-change: transform;
        }

        .app-container {
            max-width: 420px;
            width: 100%;
            margin: 0 auto;
            background-color: rgba(255, 247, 240, 0.88);
            backdrop-filter: blur(2px);
            border-radius: 32px;
            position: relative;
            z-index: 1;
            box-shadow: 0 8px 32px rgba(0,0,0,0.05);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 20px 12px 20px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 22px;
            font-weight: 700;
            color: #333;
            background: rgba(255,255,240,0.9);
            padding: 4px 12px 4px 8px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
        }
        .logo span:first-child {
            font-size: 28px;
        }
        .settings-icon {
            background: white;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
            cursor: pointer;
            font-size: 22px;
            border: 1px solid #FFE8D6;
            transition: all 0.2s ease;
        }
        .settings-icon:hover {
            background: #FFF0E0;
            transform: rotate(15deg);
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(4px);
            border-radius: 24px;
            margin: 16px 20px;
            padding: 20px 18px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(255, 240, 228, 0.8);
        }
        .earn-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.98) 0%, rgba(255, 251, 245, 0.98) 100%);
            border-bottom: 3px solid #FFD966;
            position: relative;
            overflow: hidden;
        }
        .earn-card::before {
            content: "💰💰💰";
            position: absolute;
            right: -20px;
            bottom: -10px;
            font-size: 60px;
            opacity: 0.08;
            pointer-events: none;
        }
        .earn-amount {
            font-size: 56px;
            font-weight: 800;
            color: #FF8C42;
            line-height: 1;
            margin: 8px 0 8px 0;
        }
        .earn-footnote {
            margin-top: 12px;
            font-size: 12px;
            color: #B9A394;
            display: flex;
            align-items: center;
            gap: 6px;
            border-top: 1px solid #FFEFE2;
            padding-top: 12px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 12px 0;
            border-bottom: 1px solid #F5EEE8;
        }
        .stat-row:last-child {
            border-bottom: none;
        }
        .stat-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 15px;
            color: #6F5B4C;
            font-weight: 500;
        }
        .stat-value {
            font-size: 20px;
            font-weight: 600;
            color: #2C2A29;
            font-family: monospace;
        }
        .highlight-rate {
            color: #FF7A2F;
            font-size: 22px;
        }
        .good-percent {
            color: #3CAA4A;
            background: #E9F7EB;
            padding: 4px 12px;
            border-radius: 26px;
            font-size: 18px;
            font-weight: 700;
            display: inline-block;
        }

        .button-group {
            display: flex;
            gap: 14px;
            padding: 8px 20px 28px 20px;
        }
        .btn {
            flex: 1;
            text-align: center;
            padding: 14px 0;
            border-radius: 56px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            background: white;
            border: none;
        }
        .btn-work {
            border: 2px solid #F5A623;
            color: #F5A623;
        }
        .btn-slack {
            background: #FF8C42;
            color: white;
            box-shadow: 0 4px 8px rgba(255, 140, 66, 0.2);
        }
        .btn-endwork {
            border: 2px solid #FF5A5F;
            color: #FF5A5F;
        }
        .btn:active {
            transform: scale(0.96);
        }
        .slack-active {
            background: #FFB347;
        }
        .slack-tip {
            text-align: center;
            font-size: 12px;
            color: #FF8C42;
            margin-top: -12px;
            margin-bottom: 12px;
            font-weight: 500;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(3px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-card {
            background: white;
            width: 380px;
            max-width: 90vw;
            border-radius: 32px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 35px rgba(0,0,0,0.15);
            position: relative;
        }
        .modal-close {
            position: absolute;
            top: 16px;
            right: 20px;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 24px;
            color: #B9A394;
            border-radius: 50%;
            transition: all 0.2s ease;
            z-index: 10;
            background: transparent;
        }
        .modal-close:hover {
            background: #F5F0EB;
            color: #FF6B3D;
        }
        .modal-header {
            padding: 20px 22px 12px 22px;
            text-align: center;
            border-bottom: 1px solid #F0EDE8;
            background: white;
            flex-shrink: 0;
            margin-right: 40px;
        }
        .modal-header h3 {
            font-size: 20px;
            color: #333;
            margin: 0;
        }
        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px 22px;
            max-height: 60vh;
        }
        .modal-body::-webkit-scrollbar {
            width: 4px;
        }
        .modal-body::-webkit-scrollbar-track {
            background: #F0EDE8;
            border-radius: 4px;
        }
        .modal-body::-webkit-scrollbar-thumb {
            background: #FFCFA5;
            border-radius: 4px;
        }
        .modal-footer {
            padding: 16px 22px 22px 22px;
            border-top: 1px solid #F0EDE8;
            background: white;
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
        }
        .reset-btn-footer {
            padding: 10px 20px;
            background: transparent;
            border: 1px solid #FFDECC;
            border-radius: 40px;
            color: #FF8C7A;
            font-weight: 500;
            cursor: pointer;
            font-size: 14px;
        }
        .save-btn-footer {
            padding: 10px 28px;
            background: #FF8C42;
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            font-size: 14px;
            box-shadow: 0 2px 8px rgba(255,140,66,0.2);
        }
        
        .modal-card h4 {
            font-size: 15px;
            color: #FF8C42;
            margin: 16px 0 12px 0;
            padding-bottom: 6px;
            border-bottom: 2px solid #FFE0C0;
        }
        .modal-card h4:first-of-type {
            margin-top: 0;
        }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
        }
        .setting-row label {
            font-size: 14px;
            color: #5A4A3A;
            font-weight: 500;
            flex-shrink: 0;
            width: 145px;
            cursor: pointer;
        }
        .setting-row .input-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            justify-content: flex-end;
        }
        .setting-row input {
            width: 120px;
            padding: 9px 12px;
            border-radius: 28px;
            border: 1px solid #FFE0C8;
            text-align: center;
            font-size: 14px;
            background: #FFFEFC;
        }
        .setting-row input[type="time"] {
            width: 125px;
            font-family: monospace;
        }

        .register-tip {
            font-size: 12px;
            color: #B9A394;
            text-align: center;
            padding: 8px 0 4px 0;
            margin-bottom: 8px;
            background: #FFF8F2;
            border-radius: 20px;
        }

        .summary-stats {
            margin: 20px 0;
            text-align: left;
            background: #FFF3E8;
            padding: 16px;
            border-radius: 24px;
            line-height: 1.8;
        }
    </style>
</head>
<body>

<div class="money-bg" id="moneyBg"></div>

<div class="app-container" id="app">
    <div class="header">
        <div class="logo"><span>🐱</span><span>薪薪向荣</span></div>
        <div class="settings-icon" id="openSettingsBtn">⚙️</div>
    </div>

    <div class="card earn-card">
        <div class="earn-amount" id="todayEarnDisplay">¥ 0.00</div>
        <div class="earn-footnote"><span>🕐</span> 摸鱼也是工作的一部分~人生每一秒都在积累</div>
    </div>

    <div class="card">
        <div class="stat-row"><div class="stat-label"><span>⏰</span> 已在岗时长</div><div class="stat-value" id="workDurationDisplay">0 小时</div></div>
        <div class="stat-row"><div class="stat-label"><span>🍱</span> 午休</div><div class="stat-value" id="lunchDurationDisplay">0 小时</div></div>
        <div class="stat-row"><div class="stat-label"><span>🐟</span> 摸鱼</div><div class="stat-value" id="slackDurationDisplay">0 小时</div></div>
    </div>

    <div class="card">
        <div class="stat-row"><div class="stat-label"><span>💰</span> 标准时薪</div><div class="stat-value" id="standardRateDisplay">¥ 0.00/小时</div></div>
        <div class="stat-row"><div class="stat-label"><span>🚀</span> 实际时薪</div><div class="stat-value highlight-rate" id="actualRateDisplay">¥ 0.00/小时</div></div>
        <div class="stat-row"><div class="stat-label"><span>📈</span> 高出标准</div><div class="good-percent" id="improvePercentDisplay">0.0%</div></div>
    </div>

    <div id="slackTip" class="slack-tip" style="display: none;">🐟 摸鱼中... 钱照拿，时薪偷偷涨 ⏳</div>

    <div class="button-group">
        <button class="btn btn-work" id="workBtn">上班</button>
        <button class="btn btn-slack" id="slackBtn">🐟 摸鱼</button>
        <button class="btn btn-endwork" id="offDutyBtn">下班</button>
    </div>
</div>

<div id="settingsModal" class="modal">
    <div class="modal-card">
        <div class="modal-close" id="closeSettingsX">✕</div>
        <div class="modal-header"><h3>⚙️ 设置</h3></div>
        <div class="modal-body">
            <h4>📝 打卡补登记</h4>
            <div class="register-tip">💡 忘记打卡？在这里补登记今天的时间，保存设置后生效</div>
            <div class="setting-row">
                <label for="manualClockInTime">上班时间</label>
                <div class="input-wrapper">
                    <input type="text" id="manualClockInTime" value="10:00" placeholder="HH:MM" maxlength="5" style="width: 125px;">
                </div>
            </div>
            <div class="setting-row">
                <label for="manualClockOutTime">下班时间</label>
                <div class="input-wrapper">
                    <input type="text" id="manualClockOutTime" value="" placeholder="HH:MM" maxlength="5" style="width: 125px;">
                </div>
            </div>
            
            <h4>💰 薪资设置</h4>
            <div class="setting-row">
                <label>月薪(元)</label>
                <div class="input-wrapper">
                    <input type="number" id="salaryInput" value="10000" step="1000">
                </div>
            </div>
            <div class="setting-row">
                <label>每月工作天数(天)</label>
                <div class="input-wrapper">
                    <input type="number" id="workDaysInput" step="0.25" value="21.75">
                </div>
            </div>
            <div class="setting-row">
                <label>要求最短工时(小时)</label>
                <div class="input-wrapper">
                    <input type="number" id="standardWorkHoursInput" step="0.5" value="8">
                </div>
            </div>

            <h4>🍱 午休设置</h4>
            <div class="setting-row">
                <label>标准午休时长(小时)</label>
                <div class="input-wrapper">
                    <input type="number" id="standardLunchInput" step="0.5" value="1.5">
                </div>
            </div>
            <div class="setting-row">
                <label for="lunchStartInput">开始时间</label>
                <div class="input-wrapper">
                    <input type="text" id="lunchStartInput" value="12:00" placeholder="HH:MM" maxlength="5" style="width: 125px;">
                </div>
            </div>
            <div class="setting-row">
                <label for="lunchEndInput">结束时间</label>
                <div class="input-wrapper">
                    <input type="text" id="lunchEndInput" value="13:30" placeholder="HH:MM" maxlength="5" style="width: 125px;">
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button id="resetAllDataBtn" class="reset-btn-footer">🗑️ 重置</button>
            <button id="saveSettingsBtn" class="save-btn-footer">保存设置</button>
        </div>
    </div>
</div>

<div id="summaryModal" class="modal">
    <div class="modal-card">
        <div class="modal-close" id="closeSummaryX">✕</div>
        <div class="modal-header"><h3>📊 今日摸鱼成绩单</h3></div>
        <div class="modal-body">
            <div class="summary-stats" id="summaryContent"></div>
        </div>
        <div class="modal-footer">
            <button id="closeSummaryBtn" class="save-btn-footer" style="width:100%;">明天继续暴富</button>
        </div>
    </div>
</div>

<script>
    // 时间格式化函数
    function formatTimeString(input) {
        if (!input) return '';
        // 移除所有非数字字符
        let digits = input.replace(/\D/g, '');
        if (digits.length === 0) return '';
        
        // 处理不同长度的输入
        let hours, minutes;
        if (digits.length === 1) {
            hours = digits.slice(0, 1);
            minutes = '00';
        } else if (digits.length === 2) {
            hours = digits.slice(0, 2);
            minutes = '00';
        } else if (digits.length === 3) {
            hours = digits.slice(0, 1);
            minutes = digits.slice(1, 3);
        } else {
            hours = digits.slice(0, 2);
            minutes = digits.slice(2, 4);
        }
        
        hours = parseInt(hours);
        minutes = parseInt(minutes) || 0;
        
        if (isNaN(hours)) hours = 0;
        hours = Math.min(23, Math.max(0, hours));
        minutes = Math.min(59, Math.max(0, minutes));
        
        return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}`;
    }
    
    // 为时间输入框绑定事件
    function bindTimeInput(inputId) {
        const input = document.getElementById(inputId);
        if (!input) return;
        
        // 失去焦点时格式化
        input.addEventListener('blur', function() {
            const formatted = formatTimeString(this.value);
            if (formatted) {
                this.value = formatted;
            }
        });
        
        // 输入时限制长度
        input.addEventListener('input', function(e) {
            // 只允许数字和冒号
            let val = this.value;
            val = val.replace(/[^0-9:]/g, '');
            if (val.length > 5) val = val.slice(0, 5);
            this.value = val;
        });
        
        // 点击 label 展开时间选择（使用原生时间选择器）
        const label = document.querySelector(`label[for="${inputId}"]`);
        if (label) {
            label.addEventListener('click', function(e) {
                e.preventDefault();
                // 创建临时时间选择器
                const tempInput = document.createElement('input');
                tempInput.type = 'time';
                tempInput.style.position = 'absolute';
                tempInput.style.left = '-9999px';
                tempInput.value = input.value;
                document.body.appendChild(tempInput);
                tempInput.showPicker();
                tempInput.addEventListener('change', function() {
                    input.value = tempInput.value || '';
                    document.body.removeChild(tempInput);
                });
                tempInput.addEventListener('blur', function() {
                    setTimeout(() => document.body.removeChild(tempInput), 100);
                });
            });
        }
    }
    
    function createFloatingMoney() {
        const bg = document.getElementById('moneyBg');
        if (!bg) return;
        const moneySymbols = ['💵', '💶', '💷', '💰', '💸', '💎'];
        const coinSymbols = ['🪙', '💰', '💵'];
        for (let i = 0; i < 45; i++) {
            const isCoin = Math.random() > 0.5;
            const el = document.createElement('div');
            el.className = isCoin ? 'floating-coin' : 'floating-money';
            el.textContent = isCoin ? coinSymbols[Math.floor(Math.random() * coinSymbols.length)] : moneySymbols[Math.floor(Math.random() * moneySymbols.length)];
            el.style.left = Math.random() * 100 + '%';
            el.style.top = Math.random() * 100 + '%';
            el.style.animationDuration = (5 + Math.random() * 9) + 's';
            el.style.animationDelay = Math.random() * 20 + 's';
            el.style.fontSize = (16 + Math.random() * 24) + 'px';
            bg.appendChild(el);
        }
    }
    
    let settings = {
        monthlySalary: 10000,
        workDaysPerMonth: 21.75,
        standardWorkHours: 8,
        standardLunchHours: 1.5,
        lunchStart: "12:00",
        lunchEnd: "13:30",
        manualClockInTime: "10:00",
        manualClockOutTime: ""
    };
    
    let dailyData = {
        date: null,
        clockInTime: null,
        clockOutTime: null,
        slackSeconds: 0,
        isWorking: false,
        isSlacking: false,
        slackStartTime: null
    };

    let intervalId = null;

    function formatHours(seconds) {
        if (isNaN(seconds)) seconds = 0;
        const hours = seconds / 3600;
        if (hours === 0) return '0';
        let formatted = hours.toFixed(2);
        if (formatted.endsWith('.00')) formatted = Math.floor(hours).toString();
        else if (formatted.endsWith('0')) formatted = hours.toFixed(1);
        return formatted;
    }

    function formatHoursWithUnit(seconds) {
        const val = formatHours(seconds);
        if (val === '0') return '0 小时';
        return val + ' 小时';
    }

    function getTodayTimeFromString(timeStr) {
        if (!timeStr) return null;
        const now = new Date();
        const [hours, minutes] = timeStr.split(':').map(Number);
        if (isNaN(hours) || isNaN(minutes)) return null;
        const targetTime = new Date(now.getFullYear(), now.getMonth(), now.getDate(), hours, minutes, 0);
        return targetTime.getTime();
    }

    function getActualLunchSeconds() {
        const [startH, startM] = settings.lunchStart.split(':').map(Number);
        const [endH, endM] = settings.lunchEnd.split(':').map(Number);
        const lunchStartMinutes = startH * 60 + startM;
        const lunchEndMinutes = endH * 60 + endM;
        const lunchMinutes = lunchEndMinutes - lunchStartMinutes;
        return lunchMinutes * 60;
    }

    function getStandardLunchSeconds() {
        return settings.standardLunchHours * 3600;
    }

    function getLunchDeviationSeconds() {
        return getActualLunchSeconds() - getStandardLunchSeconds();
    }

    function getOnDutySeconds() {
        if (!dailyData.isWorking || !dailyData.clockInTime) return 0;
        
        const now = dailyData.clockOutTime ? dailyData.clockOutTime : Date.now();
        let onDutySeconds = (now - dailyData.clockInTime) / 1000;
        
        const lunchStartTime = getTodayTimeFromString(settings.lunchStart);
        const lunchEndTime = getTodayTimeFromString(settings.lunchEnd);
        
        if (lunchStartTime && lunchEndTime) {
            const lunchStart = Math.max(dailyData.clockInTime, lunchStartTime);
            const lunchEnd = Math.min(now, lunchEndTime);
            if (lunchEnd > lunchStart) {
                const lunchSeconds = (lunchEnd - lunchStart) / 1000;
                onDutySeconds -= lunchSeconds;
                if (onDutySeconds < 0) onDutySeconds = 0;
            }
        }
        
        return onDutySeconds;
    }

    function getActualWorkSeconds() {
        const slackSeconds = dailyData.slackSeconds;
        const lunchDeviation = getLunchDeviationSeconds();
        
        if (dailyData.clockOutTime) {
            const onDutySeconds = getOnDutySeconds();
            let actualWork = onDutySeconds - slackSeconds - lunchDeviation;
            if (actualWork < 0) actualWork = 0;
            return actualWork;
        }
        
        let standardWorkSeconds = settings.standardWorkHours * 3600;
        let actualWork = standardWorkSeconds - slackSeconds - lunchDeviation;
        if (actualWork < 0) actualWork = 0;
        return actualWork;
    }

    function getCurrentWorkedSeconds() {
        if (!dailyData.isWorking || !dailyData.clockInTime) return 0;
        
        const now = dailyData.clockOutTime ? dailyData.clockOutTime : Date.now();
        let workedSeconds = (now - dailyData.clockInTime) / 1000;
        
        const lunchStartTime = getTodayTimeFromString(settings.lunchStart);
        const lunchEndTime = getTodayTimeFromString(settings.lunchEnd);
        
        if (lunchStartTime && lunchEndTime) {
            const lunchStart = Math.max(dailyData.clockInTime, lunchStartTime);
            const lunchEnd = Math.min(now, lunchEndTime);
            if (lunchEnd > lunchStart) {
                const lunchSeconds = (lunchEnd - lunchStart) / 1000;
                workedSeconds -= lunchSeconds;
                if (workedSeconds < 0) workedSeconds = 0;
            }
        }
        
        return workedSeconds;
    }

    function getTodayEarn() {
        const workedSeconds = getCurrentWorkedSeconds();
        const dailySalary = settings.monthlySalary / settings.workDaysPerMonth;
        const hourlyRate = dailySalary / settings.standardWorkHours;
        return (hourlyRate / 3600) * workedSeconds;
    }

    function getStandardHourlyRate() {
        const dailySalary = settings.monthlySalary / settings.workDaysPerMonth;
        return dailySalary / settings.standardWorkHours;
    }

    function getActualHourlyRate() {
        const actualWorkSeconds = getActualWorkSeconds();
        if (actualWorkSeconds <= 0) return 0;
        const dailySalary = settings.monthlySalary / settings.workDaysPerMonth;
        return dailySalary / (actualWorkSeconds / 3600);
    }

    function updateUI() {
        if (!dailyData.isWorking || !dailyData.clockInTime) {
            document.getElementById('todayEarnDisplay').innerText = '¥ 0.00';
            document.getElementById('workDurationDisplay').innerText = '0 小时';
            document.getElementById('lunchDurationDisplay').innerText = '0 小时';
            document.getElementById('slackDurationDisplay').innerText = '0 小时';
            document.getElementById('standardRateDisplay').innerHTML = `¥ ${getStandardHourlyRate().toFixed(2)}/小时`;
            document.getElementById('actualRateDisplay').innerHTML = '¥ 0.00/小时';
            document.getElementById('improvePercentDisplay').innerHTML = '0.0%';
            document.getElementById('slackTip').style.display = 'none';
            return;
        }
        
        const onDutySeconds = getOnDutySeconds();
        const actualLunchSeconds = getActualLunchSeconds();
        const slackSeconds = dailyData.slackSeconds;
        const todayEarn = getTodayEarn();
        
        const standardRate = getStandardHourlyRate();
        const actualRate = getActualHourlyRate();
        let improvePercent = 0;
        if (standardRate > 0) improvePercent = (actualRate - standardRate) / standardRate * 100;
        
        document.getElementById('todayEarnDisplay').innerText = `¥ ${todayEarn.toFixed(2)}`;
        document.getElementById('workDurationDisplay').innerHTML = formatHoursWithUnit(onDutySeconds);
        document.getElementById('lunchDurationDisplay').innerHTML = formatHoursWithUnit(actualLunchSeconds);
        document.getElementById('slackDurationDisplay').innerHTML = formatHoursWithUnit(slackSeconds);
        document.getElementById('standardRateDisplay').innerHTML = `¥ ${standardRate.toFixed(2)}/小时`;
        document.getElementById('actualRateDisplay').innerHTML = `¥ ${actualRate.toFixed(2)}/小时`;
        document.getElementById('improvePercentDisplay').innerHTML = `${improvePercent >= 0 ? '+' : ''}${improvePercent.toFixed(1)}%`;
        document.getElementById('slackTip').style.display = dailyData.isSlacking ? 'block' : 'none';
    }

    function startTimer() {
        if (intervalId) clearInterval(intervalId);
        intervalId = setInterval(() => {
            updateUI();
            if (dailyData.isWorking && !dailyData.clockOutTime) saveToLocal();
        }, 1000);
    }

    function saveToLocal() {
        const data = { settings, dailyData: { ...dailyData } };
        localStorage.setItem('xinxinxiangrong', JSON.stringify(data));
    }

    function loadFromLocal() {
        const raw = localStorage.getItem('xinxinxiangrong');
        if (!raw) return;
        try {
            const saved = JSON.parse(raw);
            settings = { ...settings, ...saved.settings };
            const sd = saved.dailyData;
            if (sd && sd.date === getTodayStr() && sd.isWorking) {
                dailyData = sd;
            }
            applySettingsToInputs();
        } catch(e) {}
    }

    function getTodayStr() {
        const d = new Date();
        return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
    }

    function resetDaily() {
        dailyData = {
            date: getTodayStr(),
            clockInTime: null,
            clockOutTime: null,
            slackSeconds: 0,
            isWorking: false,
            isSlacking: false,
            slackStartTime: null
        };
    }

    function applySettingsToInputs() {
        document.getElementById('salaryInput').value = settings.monthlySalary;
        document.getElementById('workDaysInput').value = settings.workDaysPerMonth;
        document.getElementById('standardWorkHoursInput').value = settings.standardWorkHours;
        document.getElementById('standardLunchInput').value = settings.standardLunchHours;
        document.getElementById('lunchStartInput').value = settings.lunchStart;
        document.getElementById('lunchEndInput').value = settings.lunchEnd;
        document.getElementById('manualClockInTime').value = settings.manualClockInTime || "10:00";
        document.getElementById('manualClockOutTime').value = settings.manualClockOutTime || "";
    }

    function applyManualClockTimes() {
        const clockInTimeStr = document.getElementById('manualClockInTime').value;
        let clockOutTimeStr = document.getElementById('manualClockOutTime').value;
        
        // 格式化时间
        const formattedClockIn = formatTimeString(clockInTimeStr);
        const formattedClockOut = formatTimeString(clockOutTimeStr);
        
        settings.manualClockInTime = formattedClockIn || "";
        settings.manualClockOutTime = formattedClockOut || "";
        
        if (formattedClockIn) {
            const clockInTimestamp = getTodayTimeFromString(formattedClockIn);
            if (clockInTimestamp) {
                resetDaily();
                dailyData.isWorking = true;
                dailyData.clockInTime = clockInTimestamp;
                dailyData.date = getTodayStr();
                dailyData.slackSeconds = 0;
                dailyData.isSlacking = false;
                dailyData.clockOutTime = null;
                
                if (formattedClockOut) {
                    const clockOutTimestamp = getTodayTimeFromString(formattedClockOut);
                    if (clockOutTimestamp && clockOutTimestamp > clockInTimestamp) {
                        dailyData.clockOutTime = clockOutTimestamp;
                    }
                }
                saveToLocal();
                updateUI();
            }
        } else {
            resetDaily();
            saveToLocal();
            updateUI();
        }
    }

    function saveSettingsFromModal() {
        settings.monthlySalary = parseFloat(document.getElementById('salaryInput').value) || 10000;
        settings.workDaysPerMonth = parseFloat(document.getElementById('workDaysInput').value) || 21.75;
        settings.standardWorkHours = parseFloat(document.getElementById('standardWorkHoursInput').value) || 8;
        settings.standardLunchHours = parseFloat(document.getElementById('standardLunchInput').value) || 1.5;
        
        // 获取并格式化时间
        const lunchStartRaw = document.getElementById('lunchStartInput').value;
        const lunchEndRaw = document.getElementById('lunchEndInput').value;
        settings.lunchStart = formatTimeString(lunchStartRaw) || "12:00";
        settings.lunchEnd = formatTimeString(lunchEndRaw) || "13:30";
        
        document.getElementById('lunchStartInput').value = settings.lunchStart;
        document.getElementById('lunchEndInput').value = settings.lunchEnd;
        
        settings.manualClockInTime = formatTimeString(document.getElementById('manualClockInTime').value) || "";
        settings.manualClockOutTime = formatTimeString(document.getElementById('manualClockOutTime').value) || "";
        
        document.getElementById('manualClockInTime').value = settings.manualClockInTime;
        document.getElementById('manualClockOutTime').value = settings.manualClockOutTime;
        
        applyManualClockTimes();
        
        saveToLocal();
        updateUI();
        document.getElementById('settingsModal').style.display = 'none';
    }

    function resetAllData() {
        if (confirm('确定重置所有数据吗？这将清除所有历史记录和当前打卡状态。')) {
            localStorage.removeItem('xinxinxiangrong');
            settings = {
                monthlySalary: 10000,
                workDaysPerMonth: 21.75,
                standardWorkHours: 8,
                standardLunchHours: 1.5,
                lunchStart: "12:00",
                lunchEnd: "13:30",
                manualClockInTime: "10:00",
                manualClockOutTime: ""
            };
            document.getElementById('manualClockOutTime').value = "";
            applyManualClockTimes();
            applySettingsToInputs();
            updateUI();
        }
    }

    function clockIn() {
        if (dailyData.isWorking && !dailyData.clockOutTime) return;
        const now = Date.now();
        const nowTimeStr = new Date(now).toLocaleTimeString('zh-CN', { hour12: false }).slice(0, 5);
        resetDaily();
        dailyData.isWorking = true;
        dailyData.clockInTime = now;
        dailyData.date = getTodayStr();
        dailyData.slackSeconds = 0;
        dailyData.isSlacking = false;
        dailyData.clockOutTime = null;
        settings.manualClockInTime = nowTimeStr;
        settings.manualClockOutTime = "";
        document.getElementById('manualClockOutTime').value = "";
        saveToLocal();
        updateUI();
    }

    function toggleSlack() {
        if (!dailyData.isWorking || dailyData.clockOutTime) return;
        if (!dailyData.isSlacking) {
            dailyData.isSlacking = true;
            dailyData.slackStartTime = Date.now();
            document.getElementById('slackBtn').innerHTML = '🏃 结束摸鱼';
            document.getElementById('slackBtn').classList.add('slack-active');
        } else {
            const duration = (Date.now() - dailyData.slackStartTime) / 1000;
            if (duration > 0) dailyData.slackSeconds += duration;
            dailyData.isSlacking = false;
            dailyData.slackStartTime = null;
            document.getElementById('slackBtn').innerHTML = '🐟 摸鱼';
            document.getElementById('slackBtn').classList.remove('slack-active');
            saveToLocal();
        }
        updateUI();
    }

    function offDuty() {
        if (!dailyData.isWorking || dailyData.clockOutTime) return;
        if (dailyData.isSlacking) {
            const duration = (Date.now() - dailyData.slackStartTime) / 1000;
            if (duration > 0) dailyData.slackSeconds += duration;
            dailyData.isSlacking = false;
        }
        
        const now = Date.now();
        dailyData.clockOutTime = now;
        
        const actualWorkSeconds = getActualWorkSeconds();
        const totalEarn = getTodayEarn();
        const actualRate = getActualHourlyRate();
        const stdRate = getStandardHourlyRate();
        const improve = ((actualRate - stdRate) / stdRate * 100).toFixed(1);
        
        const nowTimeStr = new Date(now).toLocaleTimeString('zh-CN', { hour12: false }).slice(0, 5);
        settings.manualClockOutTime = nowTimeStr;
        
        const actualLunchSeconds = getActualLunchSeconds();
        const lunchDeviation = getLunchDeviationSeconds();
        
        document.getElementById('summaryContent').innerHTML = `
            <div>💰 今日已赚：<strong style="color:#FF8C42;">¥${totalEarn.toFixed(2)}</strong></div>
            <div>🐟 摸鱼时长：${formatHours(dailyData.slackSeconds)} 小时</div>
            <div>💪 实际工作：${formatHours(actualWorkSeconds)} 小时</div>
            <div>🍱 午休时长：${formatHours(actualLunchSeconds)} 小时</div>
            <div>📊 午休偏差：${formatHours(lunchDeviation)} 小时</div>
            <div>🚀 实际时薪：¥${actualRate.toFixed(2)}/小时</div>
            <div>📈 高出标准：${improve >=0 ? '+' : ''}${improve}%</div>
            <div style="margin-top:12px;">🎉 摸鱼一时爽，时薪一直涨 🎉</div>
        `;
        document.getElementById('summaryModal').style.display = 'flex';
        saveToLocal();
        updateUI();
    }

    document.getElementById('openSettingsBtn').addEventListener('click', () => {
        applySettingsToInputs();
        document.getElementById('settingsModal').style.display = 'flex';
    });
    document.getElementById('closeSettingsX').addEventListener('click', () => document.getElementById('settingsModal').style.display = 'none');
    document.getElementById('closeSummaryX').addEventListener('click', () => document.getElementById('summaryModal').style.display = 'none');
    document.getElementById('saveSettingsBtn').addEventListener('click', saveSettingsFromModal);
    document.getElementById('resetAllDataBtn').addEventListener('click', resetAllData);
    document.getElementById('closeSummaryBtn').addEventListener('click', () => document.getElementById('summaryModal').style.display = 'none');
    document.getElementById('workBtn').addEventListener('click', clockIn);
    document.getElementById('slackBtn').addEventListener('click', toggleSlack);
    document.getElementById('offDutyBtn').addEventListener('click', offDuty);

    function init() {
        createFloatingMoney();
        
        // 绑定时间输入框
        bindTimeInput('manualClockInTime');
        bindTimeInput('manualClockOutTime');
        bindTimeInput('lunchStartInput');
        bindTimeInput('lunchEndInput');
        
        loadFromLocal();
        if (!dailyData.clockInTime || !dailyData.isWorking) {
            const defaultClockIn = getTodayTimeFromString("10:00");
            if (defaultClockIn) {
                dailyData.isWorking = true;
                dailyData.clockInTime = defaultClockIn;
                dailyData.date = getTodayStr();
                dailyData.slackSeconds = 0;
                dailyData.isSlacking = false;
                dailyData.clockOutTime = null;
                saveToLocal();
            }
        } else if (dailyData.date !== getTodayStr()) {
            const defaultClockIn = getTodayTimeFromString("10:00");
            if (defaultClockIn) {
                dailyData.isWorking = true;
                dailyData.clockInTime = defaultClockIn;
                dailyData.date = getTodayStr();
                dailyData.slackSeconds = 0;
                dailyData.isSlacking = false;
                dailyData.clockOutTime = null;
                saveToLocal();
            }
        }
        updateUI();
        startTimer();
    }
    init();
</script>
</body>
</html>
